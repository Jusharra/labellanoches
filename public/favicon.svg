<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#D35400"/>

  <!-- Chef hat — white toque shape -->
  <!-- Hat band / brim -->
  <rect x="8" y="20.5" width="16" height="4" rx="1.5" fill="white"/>
  <!-- Hat body (rectangle connecting puffs to brim) -->
  <rect x="9.5" y="13" width="13" height="8.5" fill="white"/>
  <!-- Three overlapping circles for the puffy toque top -->
  <circle cx="12" cy="13.5" r="4" fill="white"/>
  <circle cx="16" cy="11.5" r="4.5" fill="white"/>
  <circle cx="20" cy="13.5" r="4" fill="white"/>

  <!-- Subtle brim line to separate band from body -->
  <rect x="8" y="20.5" width="16" height="1" rx="0" fill="#C04E00" opacity="0.3"/>
</svg>
